name: Build & Release .rbz

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v0.2.0, v1.0.0
  workflow_dispatch:   # Allow manual trigger from the Actions tab

permissions:
  contents: write      # Needed to create GitHub Releases

env:
  PYTHON_VERSION: '3.11'

jobs:
  # -----------------------------------------------------------------------
  # Build the .rbz for each platform
  # -----------------------------------------------------------------------
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install engine dependencies
        working-directory: planara_engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build .rbz
        run: python scripts/build_rbz.py

      # macOS code signing (only when certificate secrets are configured)
      - name: Sign macOS binary
        if: matrix.platform == 'macos' && env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # Decode the certificate from base64
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PWD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Import the certificate
          security import certificate.p12 \
            -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Sign the engine binary
          ENGINE_BIN="planara_engine/dist/planara-engine/planara-engine"
          codesign --force --options runtime \
            --sign "$MACOS_SIGNING_IDENTITY" \
            --timestamp \
            "$ENGINE_BIN"

          # Re-sign all .so and .dylib inside _internal/
          find planara_engine/dist/planara-engine/_internal \
            \( -name '*.so' -o -name '*.dylib' \) \
            -exec codesign --force --options runtime \
              --sign "$MACOS_SIGNING_IDENTITY" \
              --timestamp {} \;

          # Rebuild the .rbz with signed binaries
          python scripts/build_rbz.py --skip-engine

          # Cleanup
          rm -f certificate.p12
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Upload .rbz artifact
        uses: actions/upload-artifact@v4
        with:
          name: planara-rbz-${{ matrix.platform }}
          path: dist/*.rbz
          retention-days: 30

  # -----------------------------------------------------------------------
  # Create a GitHub Release and attach both .rbz files
  # -----------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS .rbz
        uses: actions/download-artifact@v4
        with:
          name: planara-rbz-macos
          path: release-assets/

      - name: Download Windows .rbz
        uses: actions/download-artifact@v4
        with:
          name: planara-rbz-windows
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Planara ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Installation

            1. Download the `.rbz` file for your platform below.
            2. Open SketchUp → **Window → Extension Manager** → **Install Extension**.
            3. Select the downloaded `.rbz` file.
            4. The plugin appears under **Plugins → Planara**.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS    | `Planara-${{ steps.version.outputs.VERSION }}-macos.rbz` |
            | Windows  | `Planara-${{ steps.version.outputs.VERSION }}-windows.rbz` |

            > **Note:** Each `.rbz` bundles the full compliance engine — no Python installation required.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
