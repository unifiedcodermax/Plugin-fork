<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Planara — Live compliance</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1f2328;
      --muted: #5e6471;
      --border: #d0d7de;
      --bg: #ffffff;
      --row-bg: #f6f8fa;
      --error-bg: #ffe9e9;
      --error-fg: #a40e0e;
      --warning-bg: #fff5d1;
      --warning-fg: #7a5b00;
      --ok-bg: #e7f7e8;
      --ok-fg: #167314;
      --banner-bg: #fff0f0;
      --banner-fg: #b91c1c;
      --banner-border: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px 20px;
      color: var(--fg);
      background: var(--bg);
      font-size: 13px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 4px 0;
    }
    .summary {
      padding: 10px 12px;
      border-radius: 6px;
      margin: 0 0 14px 0;
      font-weight: 500;
    }
    .summary.ok { background: var(--ok-bg); color: var(--ok-fg); }
    .summary.fail { background: var(--error-bg); color: var(--error-fg); }
    .summary.empty { background: var(--row-bg); color: var(--muted); font-weight: 400; }
    .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 11px;
    }
    .meta span { white-space: nowrap; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 10px; }
    tr.error td.severity { color: var(--error-fg); font-weight: 600; }
    tr.warning td.severity { color: var(--warning-fg); font-weight: 600; }
    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .pill.error { background: var(--error-bg); color: var(--error-fg); }
    .pill.warning { background: var(--warning-bg); color: var(--warning-fg); }
    .pill.live {
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fb923c;
    }
    .hint-block {
      margin-top: 6px;
      padding: 6px 10px;
      border-radius: 4px;
      background: #eef6ee;
      border-left: 3px solid #4caf50;
      color: #2e5e2e;
      font-size: 11px;
      line-height: 1.5;
    }
    .hint-block .hint-icon {
      margin-right: 4px;
    }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
    .error-banner {
      display: none;
      padding: 10px 14px;
      margin: 0 0 12px 0;
      border-radius: 6px;
      border: 1px solid var(--banner-border);
      background: var(--banner-bg);
      color: var(--banner-fg);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.5;
    }
    .error-banner.visible { display: block; }
    .error-banner .icon { margin-right: 6px; }
    .error-banner .hint {
      display: block;
      margin-top: 4px;
      font-weight: 400;
      font-size: 11px;
      color: var(--muted);
    }
    .in-design-banner {
      display: none;
      padding: 12px 16px;
      margin: 0 0 12px 0;
      border-radius: 8px;
      border: 2px solid #f59e0b;
      background: #fffbeb;
      color: #92400e;
      font-size: 13px;
      line-height: 1.6;
    }
    .in-design-banner.visible { display: block; }
    .in-design-banner .live-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #fbbf24;
    }
    .in-design-banner .live-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .in-design-banner .live-item {
      padding: 8px 0;
      border-bottom: 1px solid #fde68a;
    }
    .in-design-banner .live-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .in-design-banner .live-message {
      font-weight: 700;
      font-size: 13px;
      color: #78350f;
      margin-bottom: 4px;
    }
    .in-design-banner .live-excess-row {
      margin: 5px 0;
    }
    .in-design-banner .live-excess {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      background: #fde68a;
      color: #92400e;
      font-weight: 700;
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .in-design-banner .live-values {
      font-size: 12px;
      color: #78350f;
      margin-top: 3px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .in-design-banner .live-source {
      font-size: 10px;
      color: #b45309;
      margin-top: 3px;
      font-style: italic;
    }
    /* -- Background violations (other-floor violations in Live Compliance table) -- */
    .bg-separator td {
      padding: 8px;
      font-size: 10px;
      font-weight: 600;
      color: #c2410c;
      background: #fff7ed;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #fb923c;
      border-top: 2px solid #fb923c;
    }
    tr.bg-violation {
      background: #fffbf5;
    }
    tr.bg-violation:hover {
      background: #fff7ed;
    }
    tr.bg-violation td {
      border-left: 3px solid #fb923c;
    }
    tr.bg-violation td:first-child {
      padding-left: 5px;
    }
  </style>
</head>
<body>
  <div id="in-design-banner" class="in-design-banner"></div>
  <div id="error-banner" class="error-banner"></div>
  <h1>Live compliance</h1>
  <div id="meta" class="meta"></div>
  <div id="summary" class="summary empty">Waiting for first validation…</div>
  <table id="violations-table" style="display:none">
    <thead>
      <tr>
        <th style="width:80px">Severity</th>
        <th style="width:32%">Rule</th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody id="violations-body"></tbody>
    <tbody id="background-violations-body"></tbody>
  </table>
  <div id="hints-container" style="display:none; margin-top:16px;"></div>

  <script>
    var Planara = window.Planara || {};
    window.Planara = Planara;

    // Main engine result handler
    Planara.onResult = function (payload) {
      // Clear any previous error
      Planara.clearError();

      var metrics = payload.metrics || {};
      var violations = payload.violations || [];
      var ok = payload.ok;

      // -- meta row --
      var meta = document.getElementById('meta');
      var parts = [];
      if (metrics.rule_pack_version) parts.push('Pack ' + metrics.rule_pack_version);
      if (metrics.rule_count) parts.push(metrics.rule_count + ' rules');
      if (typeof metrics.fsi === 'number') parts.push('FSI ' + metrics.fsi + ' / ' + (metrics.max_fsi || '—'));
      if (typeof metrics.ground_coverage_pct === 'number') parts.push('Coverage ' + metrics.ground_coverage_pct + '%');
      if (typeof metrics.building_height_m === 'number') parts.push('Height ' + metrics.building_height_m + ' m');
      meta.textContent = parts.join('   ');

      // -- summary --
      var summary = document.getElementById('summary');
      summary.classList.remove('empty', 'ok', 'fail');
      if (ok) {
        summary.textContent = '✅ Design is compliant.';
        summary.classList.add('ok');
      } else {
        summary.textContent = violations.length + ' violation' + (violations.length === 1 ? '' : 's') + ' — design is not compliant.';
        summary.classList.add('fail');
      }

      // -- violations table --
      var table = document.getElementById('violations-table');
      var body = document.getElementById('violations-body');
      body.innerHTML = '';

      // Clear background violations too (they'll be re-pushed by
      // the observer via boot.rb's show_validation_result)
      var bgBody = document.getElementById('background-violations-body');
      bgBody.innerHTML = '';

      if (violations.length) {
        table.style.display = '';
        violations.forEach(function (v) {
          var tr = document.createElement('tr');
          var sev = v.severity || 'warning';
          tr.innerHTML =
            '<td><span class="pill ' + sev + '">' + sev.toUpperCase() + '</span></td>' +
            '<td><code>' + escapeHtml(v.rule_id || '') + '</code></td>' +
            '<td>' + escapeHtml(v.message || '') + '</td>';
          body.appendChild(tr);
        });
      } else {
        table.style.display = 'none';
      }

      // -- hints --
      var hintsContainer = document.getElementById('hints-container');
      var hintsHtml = '';
      violations.forEach(function (v) {
        if (v.hint) {
          hintsHtml += '<div class="hint-block"><span class="hint-icon">💡</span>' + escapeHtml(v.hint) + '</div>';
        }
      });
      if (hintsHtml) {
        hintsContainer.innerHTML = hintsHtml;
        hintsContainer.style.display = '';
      } else {
        hintsContainer.style.display = 'none';
        hintsContainer.innerHTML = '';
      }
    };

    Planara.onError = function (payload) {
      var banner = document.getElementById('error-banner');
      var msg = escapeHtml(payload.message || 'An error occurred.');
      var hint = '';
      if (payload.error_type === 'extraction') {
        hint = '<span class="hint">Fix the geometry and the check will re-run automatically.</span>';
      } else if (payload.error_type === 'engine') {
        hint = '<span class="hint">The compliance engine may be restarting. It will retry automatically.</span>';
      }
      banner.innerHTML = '<span class="icon">⚠️</span>' + msg + hint;
      banner.classList.add('visible');
    };

    Planara.clearError = function () {
      var banner = document.getElementById('error-banner');
      banner.classList.remove('visible');
      banner.innerHTML = '';
    };

    // Show in-design live warnings during active tool gestures.
    // warnings: [{ type, severity, current, limit, excess, unit, source, message, detail }, ...]
    Planara.onInDesignWarning = function (warnings) {
      var banner = document.getElementById('in-design-banner');
      if (!warnings || !warnings.length) {
        Planara.clearInDesignWarning();
        return;
      }

      var html = '<div class="live-header">' +
        '<span class="live-dot"></span>' +
        ' ⚠️ Live Check — ' +
        warnings.length + ' violation' + (warnings.length === 1 ? '' : 's') +
        ' detected' +
        '</div>';

      warnings.forEach(function (w) {
        var excessText = '';
        if (typeof w.excess === 'number' && w.excess > 0) {
          var unit = w.unit || '';
          var verb = (w.type === 'setback' || w.type === 'room_height')
            ? 'violated by ' : 'exceeded by ';
          excessText = '<span class="live-excess">' +
            verb + w.excess.toFixed(2) + unit +
            '</span>';
        }

        html += '<div class="live-item">' +
          '<div class="live-message">' + escapeHtml(w.message || '') + '</div>' +
          (excessText ? '<div class="live-excess-row">' + excessText + '</div>' : '') +
          '<div class="live-values">' + escapeHtml(w.detail || '') + '</div>' +
          '</div>';
      });

      banner.innerHTML = html;
      banner.classList.add('visible');
    };

    Planara.clearInDesignWarning = function () {
      var banner = document.getElementById('in-design-banner');
      banner.classList.remove('visible');
      banner.innerHTML = '';
    };

    // Show background violations (non-active-floor violations) in the
    // Live Compliance table. These are floor-specific violations for
    // floors the architect is NOT currently editing.
    Planara.onBackgroundViolations = function (violations) {
      var bgBody = document.getElementById('background-violations-body');
      bgBody.innerHTML = '';

      if (!violations || !violations.length) return;

      // Make sure the table is visible
      var table = document.getElementById('violations-table');
      table.style.display = '';

      // Add separator row
      var sepTr = document.createElement('tr');
      sepTr.className = 'bg-separator';
      sepTr.innerHTML = '<td colspan="3">⚠ Live Check — other floors (' +
        violations.length + ' violation' + (violations.length === 1 ? '' : 's') + ')</td>';
      bgBody.appendChild(sepTr);

      // Add each violation as a row
      violations.forEach(function (v) {
        var tr = document.createElement('tr');
        tr.className = 'bg-violation';
        tr.innerHTML =
          '<td><span class="pill live">LIVE</span></td>' +
          '<td><code>' + escapeHtml(v.type || '') + '</code></td>' +
          '<td>' + escapeHtml(v.message || '') +
          (v.detail ? '<br><span style="font-size:11px;color:var(--muted)">' + escapeHtml(v.detail) + '</span>' : '') +
          '</td>';
        bgBody.appendChild(tr);
      });
    };

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', function () {
      if (window.sketchup && typeof window.sketchup.ready === 'function') {
        window.sketchup.ready('');
      }
    });
  </script>
</body>
</html>
